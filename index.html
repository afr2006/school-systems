<!DOCTYPE html>
<html>
<head>
    <title>Student System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .add-btn {
            background: green;
            color: white;
        }

        .edit-btn {
            background: orange;
            color: white;
        }

        .delete-btn {
            background: red;
            color: white;
        }

        li {
            list-style: none;
            margin: 10px 0;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
        }

        img {
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student System</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="admission" placeholder="Admission No">
    <input type="file" id="photo">

    <button class="add-btn" onclick="addStudent()">Add Student</button>

    <input type="text" id="search" placeholder="Search..." onkeyup="searchStudent()">

    <h3>Students</h3>
    <ul id="studentList"></ul>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

// Convert image to Base64
function getBase64(file, callback) {
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => callback(reader.result);
}

// Add student
function addStudent() {
    let name = document.getElementById("name").value;
    let admission = document.getElementById("admission").value;
    let file = document.getElementById("photo").files[0];

    if (!name || !admission) {
        alert("Please fill all fields");
        return;
    }

    if (file) {
        getBase64(file, function(base64) {
            saveStudent(name, admission, base64);
        });
    } else {
        saveStudent(name, admission, "");
    }
}

// Save student
function saveStudent(name, admission, photo) {
    if (editIndex === -1) {
        students.push({ name, admission, photo });
    } else {
        students[editIndex] = { name, admission, photo };
        editIndex = -1;
    }

    localStorage.setItem("students", JSON.stringify(students));
    clearForm();
    displayStudents();
}

// Display students
function displayStudents() {
    let list = document.getElementById("studentList");
    list.innerHTML = "";

    students.forEach((student, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <img src="${student.photo || 'https://via.placeholder.com/50'}" width="50">
            ${student.name} - ${student.admission}
            <br>
            <button class="edit-btn" onclick="editStudent(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
        `;

        list.appendChild(li);
    });
}

// Edit
function editStudent(index) {
    document.getElementById("name").value = students[index].name;
    document.getElementById("admission").value = students[index].admission;
    editIndex = index;
}

// Delete
function deleteStudent(index) {
    if (confirm("Delete this student?")) {
        students.splice(index, 1);
        localStorage.setItem("students", JSON.stringify(students));
        displayStudents();
    }
}

// Search
function searchStudent() {
    let input = document.getElementById("search").value.toLowerCase();
    let list = document.getElementById("studentList");
    list.innerHTML = "";

    students
        .filter(s => s.name.toLowerCase().includes(input))
        .forEach((student, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                <img src="${student.photo || 'https://via.placeholder.com/50'}" width="50">
                ${student.name} - ${student.admission}
                <br>
                <button class="edit-btn" onclick="editStudent(${index})">Edit</button>
                <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
            `;

            list.appendChild(li);
        });
}

// Clear form
function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("admission").value = "";
    document.getElementById("photo").value = "";
}

// Load data
displayStudents();
</script>

</body>
</html>
