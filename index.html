<!DOCTYPE html><html>
<head>
  <title>Advanced SMS - Fixed</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:Arial;padding:20px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border:1px solid #ccc;padding:10px;text-align:left}
    th{background:#2d6cdf;color:white}
    input,select,button{padding:8px;margin:5px}
  </style>
</head>
<body><h2>Student Management</h2><input type="text" id="search" placeholder="Search" onkeyup="search(this.value)"><br>
<input id="name" placeholder="Name">
<input id="adm" placeholder="Adm No">
<input id="class" placeholder="Class">
<input id="stream" placeholder="Stream">
<input id="dob" placeholder="DOB (dd/mm/yyyy)">
<input id="parent" placeholder="Parent Name">
<input id="phone" placeholder="Phone"><button onclick="addStudent()">Add Student</button> <button onclick="clearForm()">Clear</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Adm</th>
<th>Class</th>
<th>Rank</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table><h3>Performance Graph</h3>
<select id="studentSelect"></select>
<button onclick="showGraph()">Show Graph</button>
<canvas id="chart"></canvas><script>
let students=[];
let exams=[];
let chartInstance=null;

function addStudent(){
  let s={
    name:name.value,
    adm:adm.value,
    class:document.getElementById('class').value,
    stream:stream.value,
    dob:dob.value,
    parent:parent.value,
    phone:phone.value
  };
  students.push(s);
  display();
  loadDropdown();
  clearForm();
}

function calculateRanks(){
  let totals={};
  exams.forEach(e=>{
    totals[e.adm]=(totals[e.adm]||0)+Number(e.marks);
  });
  let sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  let ranks={};
  sorted.forEach((s,i)=>ranks[s[0]]=i+1);
  return ranks;
}

function display(){
  let table=document.getElementById('table');
  table.innerHTML="";
  let ranks=calculateRanks();

  students.forEach(s=>{
    table.innerHTML+=`\
    <tr>
      <td>${s.name}</td>
      <td>${s.adm}</td>
      <td>${s.class}</td>
      <td>${ranks[s.adm] || '-'}</td>
      <td>
        <button onclick="report('${s.adm}')">Report</button>
        <button onclick="deleteStudent('${s.adm}')">Delete</button>
      </td>
    </tr>`;
  });
}

function deleteStudent(admNo){
  students=students.filter(s=>s.adm!==admNo);
  display();
}

function report(admNo){
  let s=students.find(x=>x.adm===admNo);
  let ex=exams.filter(e=>e.adm===admNo);

  let win=window.open('','_blank');
  if(!win){alert('Allow popups');return;}

  let html=`<h2>Report Card</h2>
  Name: ${s.name}<br>
  Adm: ${s.adm}<br>
  Class: ${s.class}<br><br>
  <table border='1' cellpadding='5'>
  <tr><th>Subject</th><th>Marks</th></tr>`;

  ex.forEach(e=>{
    html+=`<tr><td>${e.subject}</td><td>${e.marks}</td></tr>`;
  });

  html+='</table>';

  win.document.write(html);
  win.document.close();
}

function loadDropdown(){
  let sel=document.getElementById('studentSelect');
  sel.innerHTML="";
  students.forEach(s=>{
    sel.innerHTML+=`<option value="${s.adm}">${s.name}</option>`;
  });
}

function showGraph(){
  let adm=document.getElementById('studentSelect').value;
  let ex=exams.filter(e=>e.adm===adm);

  if(ex.length===0){alert('No data');return;}

  let labels=ex.map(e=>e.subject);
  let data=ex.map(e=>e.marks);

  if(chartInstance) chartInstance.destroy();

  chartInstance=new Chart(document.getElementById('chart'),{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{label:'Marks',data:data}]
    }
  });
}

function search(val){
  val=val.toLowerCase();
  document.querySelectorAll('#table tr').forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(val)?'':'none';
  });
}

function clearForm(){
  name.value="";
  adm.value="";
  document.getElementById('class').value="";
  stream.value="";
  dob.value="";
  parent.value="";
  phone.value="";
}

// SAMPLE DATA (so system works immediately)
exams=[
  {adm:'1',subject:'Math',marks:80},
  {adm:'1',subject:'English',marks:70},
  {adm:'2',subject:'Math',marks:90}
];

</script></body>
</html>
