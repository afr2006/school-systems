<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef1f5;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px auto;
            border-radius: 10px;
            max-width: 600px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .green { background: green; color: white; }
        .orange { background: orange; color: white; }
        .red { background: red; color: white; }
        .blue { background: blue; color: white; }
        .black { background: black; color: white; }

        li {
            list-style: none;
            background: #f4f4f4;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        img {
            border-radius: 50%;
        }
    </style>
</head>

<body>

<div class="header">🎓 Student Management Dashboard</div>

<!-- AUTH -->
<div class="card" id="authBox">
    <h3>Login / Register</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button class="blue" onclick="login()">Login</button>
    <button class="green" onclick="register()">Register</button>
</div>

<!-- SYSTEM -->
<div id="systemBox" style="display:none;">

    <div class="card">
        <button class="black" onclick="logout()">Logout</button>
        <button class="blue" onclick="exportPDF()">Export PDF</button>
    </div>

    <div class="card">
        <h3>Add Student</h3>
        <input id="name" placeholder="Name">
        <input id="admission" placeholder="Admission No">
        <input type="file" id="photo">
        <button class="green" onclick="addStudent()">Add Student</button>
    </div>

    <div class="card">
        <h3>Search</h3>
        <input id="search" onkeyup="searchStudent()" placeholder="Search student">
    </div>

    <div class="card">
        <h3>Students</h3>
        <ul id="studentList"></ul>
    </div>

    <div class="card">
        <h3>Change Password 🔑</h3>
        <input id="oldPass" type="password" placeholder="Old Password">
        <input id="newPass" type="password" placeholder="New Password">
        <button class="orange" onclick="changePassword()">Change Password</button>
    </div>

</div>

<script>
// AUTH
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = localStorage.getItem("currentUser");

if (currentUser) showSystem();

function register() {
    let u = username.value;
    let p = password.value;

    if (!u || !p) return alert("Fill all fields");

    users.push({ username: u, password: p });
    localStorage.setItem("users", JSON.stringify(users));
    alert("Registered!");
}

function login() {
    let u = username.value;
    let p = password.value;

    let user = users.find(x => x.username === u && x.password === p);

    if (user) {
        localStorage.setItem("currentUser", u);
        showSystem();
    } else {
        alert("Wrong login");
    }
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

function showSystem() {
    authBox.style.display = "none";
    systemBox.style.display = "block";
    displayStudents();
}

// CHANGE PASSWORD
function changePassword() {
    let oldP = oldPass.value;
    let newP = newPass.value;

    let user = users.find(u => u.username === currentUser);

    if (user.password !== oldP) {
        alert("Wrong old password");
        return;
    }

    user.password = newP;
    localStorage.setItem("users", JSON.stringify(users));
    alert("Password changed!");
}

// STUDENTS
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

function getBase64(file, cb) {
    let r = new FileReader();
    r.readAsDataURL(file);
    r.onload = () => cb(r.result);
}

function addStudent() {
    let n = name.value;
    let a = admission.value;
    let f = photo.files[0];

    if (!n || !a) return alert("Fill fields");

    if (f) {
        getBase64(f, img => saveStudent(n, a, img));
    } else {
        saveStudent(n, a, "");
    }
}

function saveStudent(n, a, img) {
    if (editIndex === -1) {
        students.push({ name: n, admission: a, photo: img });
    } else {
        students[editIndex] = { name: n, admission: a, photo: img };
        editIndex = -1;
    }

    localStorage.setItem("students", JSON.stringify(students));
    displayStudents();
}

function displayStudents() {
    studentList.innerHTML = "";

    students.forEach((s, i) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <img src="${s.photo || 'https://via.placeholder.com/50'}" width="50">
            ${s.name} - ${s.admission}
            <br>
            <button class="orange" onclick="editStudent(${i})">Edit</button>
            <button class="red" onclick="deleteStudent(${i})">Delete</button>
        `;

        studentList.appendChild(li);
    });
}

function editStudent(i) {
    name.value = students[i].name;
    admission.value = students[i].admission;
    editIndex = i;
}

function deleteStudent(i) {
    if (confirm("Delete?")) {
        students.splice(i, 1);
        localStorage.setItem("students", JSON.stringify(students));
        displayStudents();
    }
}

function searchStudent() {
    let val = search.value.toLowerCase();

    studentList.innerHTML = "";

    students
        .filter(s => s.name.toLowerCase().includes(val))
        .forEach((s, i) => {
            let li = document.createElement("li");

            li.innerHTML = `
                <img src="${s.photo || 'https://via.placeholder.com/50'}" width="50">
                ${s.name} - ${s.admission}
                <br>
                <button class="orange" onclick="editStudent(${i})">Edit</button>
                <button class="red" onclick="deleteStudent(${i})">Delete</button>
            `;

            studentList.appendChild(li);
        });
}

// PDF
function exportPDF() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("Student List", 20, 20);

    let y = 30;
    students.forEach((s, i) => {
        doc.text(`${i+1}. ${s.name} - ${s.admission}`, 20, y);
        y += 10;
    });

    doc.save("students.pdf");
}
</script>

</body>
</html>
