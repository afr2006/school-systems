<!DOCTYPE html>
<html>
<head>
    <title>Student System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .add-btn { background: green; color: white; }
        .edit-btn { background: orange; color: white; }
        .delete-btn { background: red; color: white; }
        .logout-btn { background: black; color: white; }

        li {
            list-style: none;
            margin: 10px 0;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
        }

        img {
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="authBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<!-- MAIN SYSTEM -->
<div class="container" id="systemBox" style="display:none;">
    <h2>Student System</h2>

    <button class="logout-btn" onclick="logout()">Logout</button>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="admission" placeholder="Admission No">
    <input type="file" id="photo">

    <button class="add-btn" onclick="addStudent()">Add Student</button>

    <input type="text" id="search" placeholder="Search..." onkeyup="searchStudent()">

    <h3>Students</h3>
    <ul id="studentList"></ul>
</div>

<script>
// ================= AUTH SYSTEM =================
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = localStorage.getItem("currentUser");

// Auto login
if (currentUser) {
    showSystem();
}

function register() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Fill all fields");
        return;
    }

    users.push({ username, password });
    localStorage.setItem("users", JSON.stringify(users));
    alert("Registered! Now login.");
}

function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let user = users.find(u => u.username === username && u.password === password);

    if (user) {
        localStorage.setItem("currentUser", username);
        showSystem();
    } else {
        alert("Wrong login details");
    }
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

function showSystem() {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("systemBox").style.display = "block";
    displayStudents();
}

// ================= STUDENT SYSTEM =================
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

function getBase64(file, callback) {
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => callback(reader.result);
}

function addStudent() {
    let name = document.getElementById("name").value;
    let admission = document.getElementById("admission").value;
    let file = document.getElementById("photo").files[0];

    if (!name || !admission) {
        alert("Fill all fields");
        return;
    }

    if (file) {
        getBase64(file, function(base64) {
            saveStudent(name, admission, base64);
        });
    } else {
        saveStudent(name, admission, "");
    }
}

function saveStudent(name, admission, photo) {
    if (editIndex === -1) {
        students.push({ name, admission, photo });
    } else {
        students[editIndex] = { name, admission, photo };
        editIndex = -1;
    }

    localStorage.setItem("students", JSON.stringify(students));
    clearForm();
    displayStudents();
}

function displayStudents() {
    let list = document.getElementById("studentList");
    list.innerHTML = "";

    students.forEach((student, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <img src="${student.photo || 'https://via.placeholder.com/50'}" width="50">
            ${student.name} - ${student.admission}
            <br>
            <button class="edit-btn" onclick="editStudent(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
        `;

        list.appendChild(li);
    });
}

function editStudent(index) {
    document.getElementById("name").value = students[index].name;
    document.getElementById("admission").value = students[index].admission;
    editIndex = index;
}

function deleteStudent(index) {
    if (confirm("Delete this student?")) {
        students.splice(index, 1);
        localStorage.setItem("students", JSON.stringify(students));
        displayStudents();
    }
}

function searchStudent() {
    let input = document.getElementById("search").value.toLowerCase();
    let list = document.getElementById("studentList");
    list.innerHTML = "";

    students
        .filter(s => s.name.toLowerCase().includes(input))
        .forEach((student, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                <img src="${student.photo || 'https://via.placeholder.com/50'}" width="50">
                ${student.name} - ${student.admission}
                <br>
                <button class="edit-btn" onclick="editStudent(${index})">Edit</button>
                <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
            `;

            list.appendChild(li);
        });
}

function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("admission").value = "";
    document.getElementById("photo").value = "";
}
</script>

</body>
</html>
