<!DOCTYPE html>
<html>
<head>
    <title>My School System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .login-box input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        .login-box button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* MAIN SYSTEM (HIDDEN FIRST) */
        #mainSystem {
            display: none;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #388E3C;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-btn {
            background: red;
            color: white;
            padding: 5px 10px;
            float: right;
            margin-right: 10px;
            cursor: pointer;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .student-section {
            text-align: center;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .save-btn { background: green; color: white; padding: 8px; }
        .view-btn { background: blue; color: white; padding: 8px; }
        .delete-btn { background: red; color: white; padding: 5px; }
        .edit-btn { background: orange; color: white; padding: 5px; }

        footer {
            text-align: center;
            padding: 15px;
            background: #ddd;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MAIN SYSTEM -->
<div id="mainSystem">

<header>
    My School System
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Students</a>
    <a href="#">Teachers</a>
</nav>

<div class="container">
    <div class="student-section">

        <h2>Register Student</h2>

        <input type="text" id="name" placeholder="Student Name"><br><br>
        <input type="number" id="age" placeholder="Age"><br><br>

        <button class="save-btn" onclick="addStudent()">Save</button>
        <button class="view-btn" onclick="viewStudents()">View</button>

        <div id="studentList"></div>

    </div>
</div>

<footer>
    © 2026 My School System
</footer>

</div>

<script>
let editIndex = -1;

// LOGIN
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainSystem").style.display = "block";
    } else {
        alert("Wrong login details!");
    }
}

// LOGOUT
function logout() {
    document.getElementById("mainSystem").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
}

// ADD / EDIT STUDENT
function addStudent() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;

    if(name === "" || age === ""){
        alert("Fill all fields");
        return;
    }

    let students = JSON.parse(localStorage.getItem("students")) || [];

    if(editIndex === -1){
        students.push({name, age});
    } else {
        students[editIndex] = {name, age};
        editIndex = -1;
    }

    localStorage.setItem("students", JSON.stringify(students));

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";

    viewStudents();
}

// VIEW
function viewStudents() {
    let students = JSON.parse(localStorage.getItem("students")) || [];

    let output = "";

    students.forEach((s, i) => {
        output += `${i+1}. ${s.name} - Age: ${s.age}
        <button class="edit-btn" onclick="editStudent(${i})">Edit</button>
        <button class="delete-btn" onclick="deleteStudent(${i})">Delete</button><br>`;
    });

    document.getElementById("studentList").innerHTML = output || "No students yet";
}

// DELETE
function deleteStudent(index) {
    let students = JSON.parse(localStorage.getItem("students")) || [];
    students.splice(index, 1);
    localStorage.setItem("students", JSON.stringify(students));
    viewStudents();
}

// EDIT
function editStudent(index) {
    let students = JSON.parse(localStorage.getItem("students")) || [];
    document.getElementById("name").value = students[index].name;
    document.getElementById("age").value = students[index].age;
    editIndex = index;
}
</script>

</body>
</html>
