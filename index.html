<!DOCTYPE html>
<html>
<head>
    <title>School System (Offline)</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; text-align:center; }
        .container { width:90%; max-width:500px; margin:auto; background:white; padding:20px; margin-top:30px; border-radius:10px; }
        input { width:90%; padding:10px; margin:5px; }
        button { padding:10px; margin:5px; cursor:pointer; }
        .hidden { display:none; }
        .delete { background:red; color:white; }
        .edit { background:orange; color:white; }
        .logout { background:black; color:white; }
    </style>
</head>
<body>

<div class="container" id="auth">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<div class="container hidden" id="app">
    <h2>Student System</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="adm" placeholder="Admission No">
    <button onclick="addStudent()">Add Student</button>

    <h3>Students</h3>
    <ul id="list"></ul>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
    let editIndex = -1;

    function register() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if (!email || !password) return alert("Fill all fields");

        localStorage.setItem("user", JSON.stringify({email, password}));
        alert("Registered successfully!");
    }

    function login() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        let user = JSON.parse(localStorage.getItem("user"));

        if (!user || user.email !== email || user.password !== password) {
            alert("Wrong login details");
            return;
        }

        document.getElementById("auth").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        loadStudents();
    }

    function logout() {
        location.reload();
    }

    function getStudents() {
        return JSON.parse(localStorage.getItem("students")) || [];
    }

    function saveStudents(students) {
        localStorage.setItem("students", JSON.stringify(students));
    }

    function addStudent() {
        let name = document.getElementById("name").value;
        let adm = document.getElementById("adm").value;

        if (!name || !adm) return alert("Fill all fields");

        let students = getStudents();

        if (editIndex === -1) {
            students.push({name, adm});
        } else {
            students[editIndex] = {name, adm};
            editIndex = -1;
        }

        saveStudents(students);
        document.getElementById("name").value = "";
        document.getElementById("adm").value = "";

        loadStudents();
    }

    function loadStudents() {
        let list = document.getElementById("list");
        list.innerHTML = "";

        let students = getStudents();

        students.forEach((s, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                ${s.name} - ${s.adm}
                <button class="edit" onclick="editStudent(${index})">Edit</button>
                <button class="delete" onclick="deleteStudent(${index})">Delete</button>
            `;

            list.appendChild(li);
        });
    }

    function deleteStudent(index) {
        let students = getStudents();
        students.splice(index, 1);
        saveStudents(students);
        loadStudents();
    }

    function editStudent(index) {
        let students = getStudents();

        document.getElementById("name").value = students[index].name;
        document.getElementById("adm").value = students[index].adm;

        editIndex = index;
    }
</script>

</body>
</html>
