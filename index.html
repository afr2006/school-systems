<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef2f7;
            text-align: center;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 150px;
        }

        button {
            padding: 10px 15px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .add-btn {
            background: green;
        }

        .load-btn {
            background: blue;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        th {
            background: #ddd;
        }

        .delete-btn {
            background: red;
        }
    </style>
</head>

<body>

<header>School Management System</header>

<br>

<input type="text" id="name" placeholder="Student Name">
<input type="number" id="age" placeholder="Age">

<br>

<button class="add-btn" onclick="addStudent()">Add Student</button>
<button class="load-btn" onclick="loadStudents()">Load Students</button>

<table id="studentTable">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Action</th>
    </tr>
</table>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

// ADD STUDENT
function addStudent() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;

    if (name === "" || age === "") {
        alert("Please fill all fields");
        return;
    }

    students.push({ name, age });
    localStorage.setItem("students", JSON.stringify(students));

    alert("Student Added!");

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
}

// LOAD STUDENTS
function loadStudents() {
    let table = document.getElementById("studentTable");

    table.innerHTML = `
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Action</th>
        </tr>
    `;

    students = JSON.parse(localStorage.getItem("students")) || [];

    students.forEach((student, index) => {
        let row = table.insertRow();

        row.insertCell(0).innerText = student.name;
        row.insertCell(1).innerText = student.age;

        let actionCell = row.insertCell(2);
        actionCell.innerHTML = `
            <button class="delete-btn" onclick="deleteStudent(${index})">
                Delete
            </button>
        `;
    });
}

// DELETE STUDENT
function deleteStudent(index) {
    students.splice(index, 1);
    localStorage.setItem("students", JSON.stringify(students));
    loadStudents();
}
</script>

</body>
</html>
