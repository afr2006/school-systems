<!DOCTYPE html>
<html>
<head>
<title>School System</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f5;}
.header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.nav{display:flex;justify-content:center;background:#34495e;flex-wrap:wrap;}
.nav button{color:white;background:none;border:none;padding:10px;cursor:pointer;}
.card{background:white;margin:15px auto;padding:15px;max-width:750px;border-radius:10px;}
input,select{width:95%;padding:10px;margin:5px 0;}
button{padding:8px;margin:5px;border:none;cursor:pointer;}
.green{background:green;color:white;}
.orange{background:orange;color:white;}
.red{background:red;color:white;}
.blue{background:blue;color:white;}
.black{background:black;color:white;}
li{list-style:none;background:#f4f4f4;margin:10px 0;padding:10px;border-radius:8px;}
</style>
</head>

<body>

<div class="header">🏫 School Management System</div>

<!-- AUTH -->
<div class="card" id="authBox">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button class="blue" onclick="login()">Login</button>
<button class="green" onclick="register()">Register</button>
</div>

<!-- SYSTEM -->
<div id="systemBox" style="display:none;">

<div class="nav">
<button onclick="showSection('students')">Students</button>
<button onclick="showSection('teachers')">Teachers</button>
<button onclick="showSection('staff')">Non-Teaching Staff</button>
<button onclick="showSection('fees')">Fees</button>
</div>

<div class="card">
<button class="black" onclick="logout()">Logout</button>
</div>

<!-- STUDENTS -->
<div id="studentsSection">
<div class="card">
<h3>Add / Edit Student</h3>
<input id="s_name" placeholder="Name">
<input id="s_adm" placeholder="Admission No">
<input id="s_class" placeholder="Class">
<input id="s_age" placeholder="Age">
<input id="s_parent" placeholder="Parent Contact">
<button class="green" onclick="addStudent()">Save</button>
</div>
<div class="card"><ul id="studentList"></ul></div>
</div>

<!-- TEACHERS -->
<div id="teachersSection" style="display:none;">
<div class="card">
<h3>Add / Edit Teacher</h3>
<input id="t_name" placeholder="Name">
<input id="t_subject" placeholder="Subject">
<select id="t_department">
<option>Science</option>
<option>Mathematics</option>
<option>Languages</option>
<option>Humanities</option>
<option>ICT</option>
</select>
<input id="t_phone" placeholder="Phone">
<button class="green" onclick="addTeacher()">Save</button>
</div>
<div class="card"><ul id="teacherList"></ul></div>
</div>

<!-- NON-TEACHING STAFF -->
<div id="staffSection" style="display:none;">
<div class="card">
<h3>Add / Edit Staff</h3>
<input id="st_name" placeholder="Name">
<input id="st_role" placeholder="Role (e.g Cleaner)">
<select id="st_department">
<option>Administration</option>
<option>Finance</option>
<option>Security</option>
<option>Maintenance</option>
<option>Kitchen</option>
</select>
<input id="st_phone" placeholder="Phone">
<button class="green" onclick="addStaff()">Save</button>
</div>
<div class="card"><ul id="staffList"></ul></div>
</div>

<!-- FEES -->
<div id="feesSection" style="display:none;">
<div class="card">
<select id="f_student"></select>
<input id="f_paid" placeholder="Amount Paid">
<button class="green" onclick="addFee()">Save</button>
</div>
<div class="card"><ul id="feeList"></ul></div>
<div class="card">
<p id="totalPaid"></p>
<p id="totalBalance"></p>
</div>
</div>

</div>

<script>
// AUTH
let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=localStorage.getItem("currentUser");
if(currentUser) showSystem();

function register(){
if(!username.value||!password.value)return alert("Fill fields");
users.push({username:username.value,password:password.value});
localStorage.setItem("users",JSON.stringify(users));
alert("Registered");
}
function login(){
let u=users.find(x=>x.username===username.value && x.password===password.value);
if(u){localStorage.setItem("currentUser",username.value);showSystem();}
else alert("Wrong login");
}
function logout(){localStorage.removeItem("currentUser");location.reload();}
function showSystem(){
authBox.style.display="none";
systemBox.style.display="block";
displayStudents();displayTeachers();displayStaff();displayFees();loadStudents();
}

// NAV
function showSection(s){
studentsSection.style.display="none";
teachersSection.style.display="none";
staffSection.style.display="none";
feesSection.style.display="none";
document.getElementById(s+"Section").style.display="block";
}

// STUDENTS
let students=JSON.parse(localStorage.getItem("students"))||[];
let editStudentIndex=-1;

function addStudent(){
let data={name:s_name.value,adm:s_adm.value,class:s_class.value,age:s_age.value,parent:s_parent.value};
if(editStudentIndex==-1)students.push(data);
else{students[editStudentIndex]=data;editStudentIndex=-1;}
localStorage.setItem("students",JSON.stringify(students));
displayStudents();loadStudents();clearStudent();
}
function displayStudents(){
studentList.innerHTML="";
students.forEach((s,i)=>{
studentList.innerHTML+=`<li>${s.name} (${s.adm})<br>${s.class} | ${s.age}<br>${s.parent}
<button class="orange" onclick="editStudent(${i})">Edit</button>
<button class="red" onclick="delStudent(${i})">Delete</button></li>`;
});
}
function editStudent(i){
let s=students[i];
s_name.value=s.name;s_adm.value=s.adm;s_class.value=s.class;s_age.value=s.age;s_parent.value=s.parent;
editStudentIndex=i;
}
function delStudent(i){
students.splice(i,1);
localStorage.setItem("students",JSON.stringify(students));
displayStudents();loadStudents();
}
function clearStudent(){s_name.value="";s_adm.value="";s_class.value="";s_age.value="";s_parent.value="";}

// TEACHERS
let teachers=JSON.parse(localStorage.getItem("teachers"))||[];
let editTeacherIndex=-1;

function addTeacher(){
let data={name:t_name.value,subject:t_subject.value,department:t_department.value,phone:t_phone.value};
if(editTeacherIndex==-1)teachers.push(data);
else{teachers[editTeacherIndex]=data;editTeacherIndex=-1;}
localStorage.setItem("teachers",JSON.stringify(teachers));
displayTeachers();clearTeacher();
}
function displayTeachers(){
teacherList.innerHTML="";
teachers.forEach((t,i)=>{
teacherList.innerHTML+=`<li>${t.name}<br>${t.subject} | ${t.department}<br>${t.phone}
<button class="orange" onclick="editTeacher(${i})">Edit</button>
<button class="red" onclick="delTeacher(${i})">Delete</button></li>`;
});
}
function editTeacher(i){
let t=teachers[i];
t_name.value=t.name;t_subject.value=t.subject;t_department.value=t.department;t_phone.value=t.phone;
editTeacherIndex=i;
}
function delTeacher(i){
teachers.splice(i,1);
localStorage.setItem("teachers",JSON.stringify(teachers));
displayTeachers();
}
function clearTeacher(){t_name.value="";t_subject.value="";t_phone.value="";}

// STAFF
let staff=JSON.parse(localStorage.getItem("staff"))||[];
let editStaffIndex=-1;

function addStaff(){
let data={name:st_name.value,role:st_role.value,department:st_department.value,phone:st_phone.value};
if(editStaffIndex==-1)staff.push(data);
else{staff[editStaffIndex]=data;editStaffIndex=-1;}
localStorage.setItem("staff",JSON.stringify(staff));
displayStaff();clearStaff();
}
function displayStaff(){
staffList.innerHTML="";
staff.forEach((s,i)=>{
staffList.innerHTML+=`<li>${s.name}<br>${s.role} | ${s.department}<br>${s.phone}
<button class="orange" onclick="editStaff(${i})">Edit</button>
<button class="red" onclick="delStaff(${i})">Delete</button></li>`;
});
}
function editStaff(i){
let s=staff[i];
st_name.value=s.name;st_role.value=s.role;st_department.value=s.department;st_phone.value=s.phone;
editStaffIndex=i;
}
function delStaff(i){
staff.splice(i,1);
localStorage.setItem("staff",JSON.stringify(staff));
displayStaff();
}
function clearStaff(){st_name.value="";st_role.value="";st_phone.value="";}

// FEES
let fees=JSON.parse(localStorage.getItem("fees"))||[];
let editFeeIndex=-1;

function loadStudents(){
f_student.innerHTML="";
students.forEach((s,i)=>{
f_student.innerHTML+=`<option value="${i}">${s.name}</option>`;
});
}

function addFee(){
let student=students[f_student.value];
let paid=Number(f_paid.value);
let total=10000;
let balance=total-paid;

let data={student:student.name,paid,balance};

if(editFeeIndex==-1)fees.push(data);
else{fees[editFeeIndex]=data;editFeeIndex=-1;}

localStorage.setItem("fees",JSON.stringify(fees));
displayFees();
}

function displayFees(){
feeList.innerHTML="";
let tp=0,tb=0;

fees.forEach((f,i)=>{
tp+=f.paid;tb+=f.balance;

feeList.innerHTML+=`<li>${f.student} - Paid:${f.paid} | Balance:${f.balance}
<button class="orange" onclick="editFee(${i})">Edit</button>
<button class="red" onclick="delFee(${i})">Delete</button></li>`;
});

totalPaid.innerText="Total Paid: "+tp;
totalBalance.innerText="Total Balance: "+tb;
}

function editFee(i){
f_paid.value=fees[i].paid;
editFeeIndex=i;
}

function delFee(i){
fees.splice(i,1);
localStorage.setItem("fees",JSON.stringify(fees));
displayFees();
}
</script>

</body>
</html>
