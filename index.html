<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student System</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

.container {
    width: 350px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 6px 10px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

.add-btn { background: #4CAF50; color: white; }
.edit-btn { background: orange; color: white; }
.delete-btn { background: red; color: white; }

li {
    text-align: left;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">
    <h2>Student System</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="adm" placeholder="Admission No">
    <br>
    <button class="add-btn" onclick="addStudent()">Add Student</button>

    <br><br>
    <input type="text" id="search" placeholder="Search student..." onkeyup="searchStudent()">

    <h3>Students</h3>
    <ul id="list"></ul>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function saveData() {
    localStorage.setItem("students", JSON.stringify(students));
}

function addStudent() {
    let name = document.getElementById("name").value;
    let adm = document.getElementById("adm").value;

    if(name === "" || adm === "") {
        alert("Fill all fields!");
        return;
    }

    students.push({name, adm});
    saveData();
    displayStudents();

    document.getElementById("name").value = "";
    document.getElementById("adm").value = "";
}

function displayStudents(filtered = students) {
    let list = document.getElementById("list");
    list.innerHTML = "";

    filtered.forEach((student, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
            ${student.name} - ${student.adm}
            <button class="edit-btn" onclick="editStudent(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
        `;

        list.appendChild(li);
    });
}

function deleteStudent(index) {
    if(confirm("Are you sure you want to delete?")) {
        students.splice(index, 1);
        saveData();
        displayStudents();
    }
}

function editStudent(index) {
    let newName = prompt("Edit Name:", students[index].name);
    let newAdm = prompt("Edit Admission No:", students[index].adm);

    if(newName && newAdm) {
        students[index] = {name: newName, adm: newAdm};
        saveData();
        displayStudents();
    }
}

function searchStudent() {
    let value = document.getElementById("search").value.toLowerCase();

    let filtered = students.filter(s =>
        s.name.toLowerCase().includes(value) ||
        s.adm.includes(value)
    );

    displayStudents(filtered);
}

// Load data on start
displayStudents();
</script>

</body>
</html>
