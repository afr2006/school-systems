<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            text-align: center;
        }

        h1 {
            background: #4CAF50;
            color: white;
            padding: 15px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .add-btn { background: green; }
        .load-btn { background: blue; }
        .delete-btn { background: red; }

        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<h1>School Management System</h1>

<input type="text" id="name" placeholder="Student Name">
<input type="number" id="age" placeholder="Age"><br>

<button class="add-btn" onclick="addStudent()">Add Student</button>
<button class="load-btn" onclick="loadStudents()">Load Students</button>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="studentList"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY_HERE",
    authDomain: "my-school-system-6b.firebaseapp.com",
    projectId: "my-school-system-6b",
    storageBucket: "my-school-system-6b.appspot.com",
    messagingSenderId: "996069799287",
    appId: "1:996069799287:web:f81dxxxx"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ADD STUDENT
  async function addStudent() {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    if (name === "" || age === "") {
        alert("Fill all fields!");
        return;
    }

    await addDoc(collection(db, "students"), {
        name: name,
        age: age
    });

    alert("Student Added!");
  }

  // LOAD STUDENTS
  async function loadStudents() {
    const table = document.getElementById("studentList");
    table.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "students"));

    querySnapshot.forEach((docItem) => {
        const data = docItem.data();

        table.innerHTML += `
            <tr>
                <td>${data.name}</td>
                <td>${data.age}</td>
                <td>
                    <button class="delete-btn" onclick="deleteStudent('${docItem.id}')">Delete</button>
                </td>
            </tr>
        `;
    });
  }

  // DELETE STUDENT
  async function deleteStudent(id) {
    await deleteDoc(doc(db, "students", id));
    alert("Deleted!");
    loadStudents();
  }

  // Make functions usable in HTML
  window.addStudent = addStudent;
  window.loadStudents = loadStudents;
  window.deleteStudent = deleteStudent;

</script>

</body>
</html>
