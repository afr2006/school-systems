<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Student System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background: #f2f2f2; text-align: center; }

.container {
    width: 350px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 6px 10px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

.add-btn { background: green; color: white; }
.edit-btn { background: orange; color: white; }
.delete-btn { background: red; color: white; }
.logout { background: black; color: white; }

img { width: 40px; height: 40px; border-radius: 50%; }

li { text-align: left; margin: 10px 0; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<!-- SYSTEM -->
<div class="container" id="systemPage" style="display:none;">
    <h2>Student System</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="adm" placeholder="Admission No">
    <input type="file" id="photo">
    <br>
    <button class="add-btn" onclick="addStudent()">Add Student</button>

    <br><br>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchStudent()">

    <h3>Students</h3>
    <ul id="list"></ul>

    <button onclick="exportPDF()">Export PDF</button>
    <br><br>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let students = JSON.parse(localStorage.getItem("students")) || [];

// LOGIN SYSTEM
function register() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "" || pass === "") return alert("Fill all fields");

    users.push({user, pass});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registered! Now login");
}

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let found = users.find(u => u.user === user && u.pass === pass);

    if(found) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("systemPage").style.display = "block";
    } else {
        alert("Wrong details");
    }
}

function logout() {
    location.reload();
}

// SAVE
function saveStudents() {
    localStorage.setItem("students", JSON.stringify(students));
}

// ADD STUDENT
function addStudent() {
    let name = document.getElementById("name").value;
    let adm = document.getElementById("adm").value;
    let file = document.getElementById("photo").files[0];

    if(!name || !adm) return alert("Fill all fields");

    let reader = new FileReader();

    reader.onload = function() {
        students.push({
            name,
            adm,
            photo: reader.result || ""
        });

        saveStudents();
        displayStudents();
    };

    if(file) reader.readAsDataURL(file);
    else reader.onload();

    document.getElementById("name").value = "";
    document.getElementById("adm").value = "";
    document.getElementById("photo").value = "";
}

// DISPLAY
function displayStudents(filtered = students) {
    let list = document.getElementById("list");
    list.innerHTML = "";

    filtered.forEach((s, i) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <img src="${s.photo || ''}"/>
            ${s.name} - ${s.adm}
            <button class="edit-btn" onclick="editStudent(${i})">Edit</button>
            <button class="delete-btn" onclick="deleteStudent(${i})">Delete</button>
        `;

        list.appendChild(li);
    });
}

// DELETE
function deleteStudent(i) {
    if(confirm("Delete student?")) {
        students.splice(i,1);
        saveStudents();
        displayStudents();
    }
}

// EDIT
function editStudent(i) {
    let name = prompt("Edit name", students[i].name);
    let adm = prompt("Edit adm", students[i].adm);

    if(name && adm) {
        students[i].name = name;
        students[i].adm = adm;
        saveStudents();
        displayStudents();
    }
}

// SEARCH
function searchStudent() {
    let val = document.getElementById("search").value.toLowerCase();

    let filtered = students.filter(s =>
        s.name.toLowerCase().includes(val) ||
        s.adm.includes(val)
    );

    displayStudents(filtered);
}

// EXPORT PDF
function exportPDF() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("Student List", 10, 10);

    let y = 20;
    students.forEach(s => {
        doc.text(`${s.name} - ${s.adm}`, 10, y);
        y += 10;
    });

    doc.save("students.pdf");
}

// INIT
displayStudents();
</script>

</body>
</html>
