<!DOCTYPE html>
<html>
<head>
  <title>School Management System</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }

    header {
      background: linear-gradient(90deg, green, darkgreen);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 90%;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      cursor: pointer;
    }

    .btn-login { background: green; color: white; }
    .btn-register { background: blue; color: white; }
    .btn-logout { background: red; color: white; }
    .btn-add { background: darkgreen; color: white; }
    .btn-delete { background: crimson; color: white; }

    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>School Management System</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginSection">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button class="btn-login" onclick="loginUser()">Login</button>
    <button class="btn-register" onclick="registerUser()">Register</button>
  </div>

  <!-- MAIN SYSTEM -->
  <div id="mainSection" style="display:none;">
    <h2>Dashboard</h2>

    <button class="btn-logout" onclick="logoutUser()">Logout</button>

    <h3>Change Password</h3>
    <input type="password" id="newPassword" placeholder="New Password">
    <button onclick="changePassword()">Change Password</button>

    <h3>Add Student</h3>
    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="age" placeholder="Age">
    <input type="text" id="grade" placeholder="Grade">
    <button class="btn-add" onclick="addStudent()">Add Student</button>

    <h3>Students List</h3>
    <div id="studentList"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  updatePassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-ID",
  storageBucket: "YOUR.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.loginUser = function () {
  const email = emailInput.value;
  const password = passwordInput.value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Login successful"))
    .catch(err => alert(err.message));
};

// REGISTER
window.registerUser = function () {
  const email = emailInput.value;
  const password = passwordInput.value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Account created"))
    .catch(err => alert(err.message));
};

// LOGOUT
window.logoutUser = function () {
  signOut(auth);
};

// CHANGE PASSWORD
window.changePassword = function () {
  const user = auth.currentUser;
  const newPass = document.getElementById("newPassword").value;

  if (!user) return alert("Not logged in");

  updatePassword(user, newPass)
    .then(() => alert("Password updated successfully"))
    .catch(err => alert(err.message));
};

// ADD STUDENT
window.addStudent = async function () {
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const grade = document.getElementById("grade").value;

  await addDoc(collection(db, "students"), {
    name, age, grade
  });

  alert("Student added");
  loadStudents();
};

// LOAD STUDENTS
async function loadStudents() {
  const querySnapshot = await getDocs(collection(db, "students"));
  const list = document.getElementById("studentList");
  list.innerHTML = "";

  querySnapshot.forEach(docSnap => {
    const data = docSnap.data();

    list.innerHTML += `
      <div class="card">
        ${data.name} - Age: ${data.age} - Grade: ${data.grade}
        <br>
        <button class="btn-delete" onclick="deleteStudent('${docSnap.id}')">Delete</button>
      </div>
    `;
  });
}

// DELETE STUDENT
window.deleteStudent = async function (id) {
  await deleteDoc(doc(db, "students", id));
  loadStudents();
};

// AUTO LOGIN CHECK
onAuthStateChanged(auth, user => {
  if (user) {
    loginSection.style.display = "none";
    mainSection.style.display = "block";
    loadStudents();
  } else {
    loginSection.style.display = "block";
    mainSection.style.display = "none";
  }
});
</script>

</body>
</html>
