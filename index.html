<!DOCTYPE html>
<html>
<head>
    <title>Africore School System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        h2 {
            color: #2E7D32;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: bold;
        }

        .btn:hover {
            background: #388E3C;
        }

        footer {
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    🎓 Africore School Management System
</header>

<div class="container">

    <div class="card">
        <h2>Welcome</h2>
        <p>
            This system allows schools to register students, track school fees,
            monitor balances, and give controlled access to teachers.
            The administrator has full control over the system.
        </p>

        <a href="#" class="btn">Login</a>
    </div>

</div>

<footer>
    © 2026 Africore Systems
</footer>

</body>
</html>
