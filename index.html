<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef2f7;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 90%;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .login-btn { background: #2196F3; }
        .add-btn { background: #4CAF50; }
        .delete-btn { background: red; }

        .card {
            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h2>School Management System</h2>
</header>

<div class="container">

    <!-- LOGIN -->
    <div id="loginPage">
        <h3>Login</h3>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button class="login-btn" onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <h3>Dashboard</h3>

        <input type="text" id="adm" placeholder="Admission Number"><br>
        <input type="text" id="name" placeholder="Student Name"><br>
        <input type="text" id="class" placeholder="Class"><br>

        <button class="add-btn" onclick="addStudent()">Add Student</button>

        <h3>Students</h3>
        <div id="students"></div>
    </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR-API-KEY",
    authDomain: "YOUR-PROJECT-ID.firebaseapp.com",
    projectId: "YOUR-PROJECT-ID",
    storageBucket: "YOUR-PROJECT-ID.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN SYSTEM
window.login = function() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadStudents();
    } else {
        alert("Wrong login details");
    }
}

// ADD STUDENT
window.addStudent = async function() {
    let adm = document.getElementById("adm").value;
    let name = document.getElementById("name").value;
    let cls = document.getElementById("class").value;

    if (adm === "" || name === "" || cls === "") {
        alert("Fill all fields");
        return;
    }

    await addDoc(collection(db, "students"), {
        adm: adm,
        name: name,
        class: cls
    });

    alert("Student Added");
    loadStudents();
}

// LOAD STUDENTS
async function loadStudents() {
    const querySnapshot = await getDocs(collection(db, "students"));
    let output = "";

    querySnapshot.forEach((docSnap) => {
        let data = docSnap.data();

        output += `
            <div class="card">
                <b>${data.name}</b><br>
                Adm: ${data.adm}<br>
                Class: ${data.class}<br>
                <button class="delete-btn" onclick="deleteStudent('${docSnap.id}')">Delete</button>
            </div>
        `;
    });

    document.getElementById("students").innerHTML = output;
}

// DELETE STUDENT
window.deleteStudent = async function(id) {
    await deleteDoc(doc(db, "students", id));
    loadStudents();
}
</script>

</body>
</html>
