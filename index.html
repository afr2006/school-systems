<!DOCTYPE html>
<html>
<head>
    <title>My School System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #388E3C;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 30px;
        }

        .hero button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card button {
            background: #4CAF50;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .student-section {
            text-align: center;
            padding: 20px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            margin: 5px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .save-btn {
            background: #4CAF50;
            color: white;
            padding: 8px 15px;
        }

        .view-btn {
            background: #2196F3;
            color: white;
            padding: 8px 15px;
        }

        .delete-btn {
            background: red;
            color: white;
            padding: 5px 10px;
            margin-left: 10px;
        }

        #studentList {
            margin-top: 20px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #ddd;
        }
    </style>
</head>

<body>

<header>
    My School System
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Students</a>
    <a href="#">Teachers</a>
    <a href="#">Fees</a>
</nav>

<div class="hero">
    <h1>Welcome to My School System 🎓</h1>
    <p>Manage students easily</p>
    <button onclick="login()">Login</button>
</div>

<div class="container">
    <div class="card">
        <h3>Students</h3>
        <p>Register and manage students</p>
        <button onclick="alert('Use form below')">Open</button>
    </div>

    <div class="card">
        <h3>Teachers</h3>
        <p>Coming soon</p>
        <button onclick="alert('Coming soon')">Open</button>
    </div>

    <div class="card">
        <h3>Fees</h3>
        <p>Coming soon</p>
        <button onclick="alert('Coming soon')">Open</button>
    </div>
</div>

<div class="student-section">
    <h2>Register Student</h2>

    <input type="text" id="name" placeholder="Student Name"><br><br>
    <input type="number" id="age" placeholder="Age"><br><br>

    <button class="save-btn" onclick="addStudent()">Save Student</button>
    <button class="view-btn" onclick="viewStudents()">View Students</button>

    <div id="studentList"></div>
</div>

<footer>
    © 2026 My School System
</footer>

<script>
function login() {
    let user = prompt("Enter username:");
    let pass = prompt("Enter password:");

    if(user === "admin" && pass === "1234"){
        alert("Login successful!");
    } else {
        alert("Wrong login details!");
    }
}

function addStudent() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;

    if(name === "" || age === ""){
        alert("Fill all fields");
        return;
    }

    let students = JSON.parse(localStorage.getItem("students")) || [];

    students.push({name: name, age: age});

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student saved!");

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
}

function viewStudents() {
    let students = JSON.parse(localStorage.getItem("students")) || [];

    let output = "";

    students.forEach((s, index) => {
        output += (index + 1) + ". " + s.name + 
        " - Age: " + s.age + 
        ` <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button><br>`;
    });

    if(output === ""){
        output = "No students saved yet";
    }

    document.getElementById("studentList").innerHTML = output;
}

function deleteStudent(index) {
    let students = JSON.parse(localStorage.getItem("students")) || [];

    students.splice(index, 1);

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student deleted!");

    viewStudents();
}
</script>

</body>
</html>
