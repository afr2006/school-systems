<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef2f7;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .add-btn {
            background: green;
        }

        .delete-btn {
            background: red;
        }

        .login-btn {
            background: #2196F3;
        }

        .card {
            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        #dashboard {
            display: none;
        }
    </style>
</head>

<body>

<header>
    <h2>School Management System</h2>
</header>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <h3>Login</h3>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button class="login-btn" onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <h3>Dashboard</h3>

        <input id="adm" placeholder="Admission Number">
        <input id="name" placeholder="Student Name">
        <input id="class" placeholder="Class">

        <button class="add-btn" onclick="addStudent()">Add Student</button>

        <h3>Students</h3>
        <div id="studentsList"></div>
    </div>

</div>

<script type="module">
    // 🔥 Firebase Import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, getDocs, deleteDoc, doc 
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    // 🔥 YOUR FIREBASE CONFIG (PASTE YOURS HERE)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "XXXX",
        appId: "XXXX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔐 LOGIN
    window.login = function() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        if (user === "admin" && pass === "1234") {
            document.getElementById("login").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            loadStudents();
        } else {
            alert("Wrong login details");
        }
    }

    // ➕ ADD STUDENT
    window.addStudent = async function() {
        const adm = document.getElementById("adm").value;
        const name = document.getElementById("name").value;
        const cls = document.getElementById("class").value;

        if (!adm || !name || !cls) {
            alert("Fill all fields");
            return;
        }

        await addDoc(collection(db, "students"), {
            adm,
            name,
            class: cls
        });

        alert("Student Added");

        document.getElementById("adm").value = "";
        document.getElementById("name").value = "";
        document.getElementById("class").value = "";

        loadStudents();
    }

    // 📥 LOAD STUDENTS
    async function loadStudents() {
        const querySnapshot = await getDocs(collection(db, "students"));
        const list = document.getElementById("studentsList");
        list.innerHTML = "";

        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();

            list.innerHTML += `
                <div class="card">
                    <b>${data.adm}</b><br>
                    ${data.name}<br>
                    ${data.class}<br>
                    <button class="delete-btn" onclick="deleteStudent('${docSnap.id}')">Delete</button>
                </div>
            `;
        });
    }

    // ❌ DELETE
    window.deleteStudent = async function(id) {
        await deleteDoc(doc(db, "students", id));
        loadStudents();
    }

</script>

</body>
</html>
