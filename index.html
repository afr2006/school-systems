<!DOCTYPE html>
<html>
<head>
    <title>School System (Full Firebase)</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            text-align: center;
        }

        .container {
            margin-top: 50px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            border: none;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        .login { background: green; }
        .register { background: blue; }
        .add { background: green; }
        .delete { background: red; }
        .logout { background: black; }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        #dashboard { display: none; }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="container">
    <h2>Login / Register</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <br>

    <button class="login" onclick="login()">Login</button>
    <button class="register" onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container">
    <h2>Student Dashboard</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="age" placeholder="Age">

    <br>

    <button class="add" onclick="addStudent()">Add Student</button>
    <button class="logout" onclick="logout()">Logout</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="students"></tbody>
    </table>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔴 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "YOUR-KEY",
    authDomain: "YOUR-PROJECT.firebaseapp.com",
    projectId: "YOUR-PROJECT-ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH FUNCTIONS
window.register = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Registered successfully!");
    } catch (error) {
        alert(error.message);
    }
};

window.login = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful!");
    } catch (error) {
        alert(error.message);
    }
};

window.logout = function () {
    signOut(auth);
};

// SHOW/HIDE UI
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("auth").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadStudents();
    } else {
        document.getElementById("auth").style.display = "block";
        document.getElementById("dashboard").style.display = "none";
    }
});

// STUDENT FUNCTIONS
window.addStudent = async function () {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;

    if (name === "" || age === "") {
        alert("Fill all fields");
        return;
    }

    await addDoc(collection(db, "students"), {
        name: name,
        age: age
    });

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";

    loadStudents();
};

async function loadStudents() {
    let table = document.getElementById("students");
    table.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "students"));

    querySnapshot.forEach((docSnap) => {
        let data = docSnap.data();

        table.innerHTML += `
            <tr>
                <td>${data.name}</td>
                <td>${data.age}</td>
                <td>
                    <button class="delete" onclick="deleteStudent('${docSnap.id}')">Delete</button>
                </td>
            </tr>
        `;
    });
}

window.deleteStudent = async function (id) {
    await deleteDoc(doc(db, "students", id));
    loadStudents();
};
</script>
