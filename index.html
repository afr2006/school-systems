<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef2f7;
        }

        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 150px;
        }

        button {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .add-btn { background: green; }
        .load-btn { background: blue; }
        .delete-btn { background: red; }
        .logout-btn { background: black; }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background: #ddd;
        }

        #loginPage, #appPage {
            display: none;
        }
    </style>
</head>

<body>

<header>
    <h2>School Management System</h2>
</header>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- APP PAGE -->
<div id="appPage" class="container">
    <button class="logout-btn" onclick="logout()">Logout</button><br><br>

    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="age" placeholder="Age"><br>

    <button class="add-btn" onclick="addStudent()">Add Student</button>
    <button class="load-btn" onclick="loadStudents()">Load Students</button>

    <br><br>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>
</div>

<script>
    // Default login
    const USER = "admin";
    const PASS = "1234";

    // Show login first
    document.getElementById("loginPage").style.display = "block";

    function login() {
        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        if (u === USER && p === PASS) {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("appPage").style.display = "block";
            loadStudents();
        } else {
            alert("Wrong login details");
        }
    }

    function logout() {
        document.getElementById("appPage").style.display = "none";
        document.getElementById("loginPage").style.display = "block";
    }

    function addStudent() {
        let name = document.getElementById("name").value;
        let age = document.getElementById("age").value;

        if (name === "" || age === "") {
            alert("Fill all fields");
            return;
        }

        let students = JSON.parse(localStorage.getItem("students")) || [];

        students.push({ name, age });

        localStorage.setItem("students", JSON.stringify(students));

        document.getElementById("name").value = "";
        document.getElementById("age").value = "";

        loadStudents();
    }

    function loadStudents() {
        let students = JSON.parse(localStorage.getItem("students")) || [];
        let table = document.getElementById("studentList");

        table.innerHTML = "";

        students.forEach((student, index) => {
            table.innerHTML += `
                <tr>
                    <td>${student.name}</td>
                    <td>${student.age}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function deleteStudent(index) {
        let students = JSON.parse(localStorage.getItem("students")) || [];

        students.splice(index, 1);

        localStorage.setItem("students", JSON.stringify(students));

        loadStudents();
    }
</script>

</body>
</html>
