<!DOCTYPE html>
<html>
<head>
    <title>My School System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        /* NAVBAR */
        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #388E3C;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        .hero button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .hero button:hover {
            background: #2E7D32;
        }

        /* CARDS */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card button {
            background: #4CAF50;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background: #2E7D32;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: #ddd;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    My School System
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Students</a>
    <a href="#">Teachers</a>
    <a href="#">Fees</a>
</nav>

<div class="hero">
    <h1>Welcome to My School System 🎓</h1>
    <p>Manage students, teachers and school records easily</p>
    <button onclick="login()">Login</button>
</div>

<div class="container">

    <div class="card">
        <h3>Students</h3>
        <p>Register and manage students</p>
        <button onclick="alert('Students section coming soon')">Open</button>
    </div>

    <div class="card">
        <h3>Teachers</h3>
        <p>Manage teacher records</p>
        <button onclick="alert('Teachers section coming soon')">Open</button>
    </div>

    <div class="card">
        <h3>Fees</h3>
        <p>Track school payments</p>
        <button onclick="alert('Fees section coming soon')">Open</button>
    </div>

</div>

<footer>
    © 2026 My School System
</footer>

<script>
    function login() {
        let user = prompt("Enter username:");
        let pass = prompt("Enter password:");

        if(user === "admin" && pass === "1234"){
            alert("Login successful!");
        } else {
            alert("Wrong login details!");
        }
    }
</script>

</body>
</html>
