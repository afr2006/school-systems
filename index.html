<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            margin: 0;
        }

        header {
            background: green;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            cursor: pointer;
        }

        .deleteBtn {
            background: red;
            color: white;
        }

        #dashboard {
            display: none;
        }
    </style>
</head>

<body>

<header>
    <h2>School System</h2>
</header>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <h3>Login</h3>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <button onclick="showRegister()">Register</button>
    </div>

    <!-- REGISTER -->
    <div id="register" style="display:none;">
        <h3>Register</h3>
        <input type="email" id="regEmail" placeholder="Email"><br>
        <input type="password" id="regPassword" placeholder="Password"><br>
        <button onclick="register()">Create Account</button>
        <button onclick="showLogin()">Back</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <h3>Dashboard</h3>

        <input type="text" id="name" placeholder="Student Name">
        <input type="number" id="age" placeholder="Age">
        <button onclick="addStudent()">Add Student</button>

        <h3>Students</h3>
        <ul id="studentList"></ul>

        <button onclick="logout()">Logout</button>
    </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";


// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
    apiKey: "PASTE HERE",
    authDomain: "PASTE HERE",
    projectId: "PASTE HERE",
    storageBucket: "PASTE HERE",
    messagingSenderId: "PASTE HERE",
    appId: "PASTE HERE"
};


// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// UI FUNCTIONS
window.showRegister = function() {
    document.getElementById("login").style.display = "none";
    document.getElementById("register").style.display = "block";
}

window.showLogin = function() {
    document.getElementById("login").style.display = "block";
    document.getElementById("register").style.display = "none";
}


// AUTH
window.register = function() {
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("Registered successfully"))
        .catch(err => alert(err.message));
}

window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            document.getElementById("login").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            loadStudents();
        })
        .catch(err => alert(err.message));
}

window.logout = function() {
    signOut(auth).then(() => {
        location.reload();
    });
}


// STUDENTS
window.addStudent = async function() {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    if (!name || !age) {
        alert("Fill all fields");
        return;
    }

    await addDoc(collection(db, "students"), {
        name,
        age
    });

    alert("Student added");
    loadStudents();
}

async function loadStudents() {
    const list = document.getElementById("studentList");
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "students"));

    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();

        const li = document.createElement("li");
        li.innerHTML = `
            ${data.name} (${data.age})
            <button class="deleteBtn" onclick="deleteStudent('${docSnap.id}')">Delete</button>
        `;

        list.appendChild(li);
    });
}

window.deleteStudent = async function(id) {
    await deleteDoc(doc(db, "students", id));
    loadStudents();
}

</script>

</body>
</html>
