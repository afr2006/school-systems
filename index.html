<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartSchool Pro FINAL + SMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.sidebar{width:220px;height:100vh;background:#2c3e50;position:fixed;color:white;}
.sidebar button{width:100%;padding:12px;background:none;border:none;color:white;text-align:left;}
.content{margin-left:220px;padding:20px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:8px;}
input,select,textarea{width:100%;padding:8px;margin:5px 0;}
button{padding:8px;background:#3498db;color:white;border:none;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;}
.print{background:white;padding:20px;}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" style="text-align:center;padding:50px;">
<h2>SmartSchool Pro</h2>
<button onclick="adminPage()">Admin</button>
<button onclick="parentPage()">Parent</button>
</div>

<!-- ADMIN LOGIN -->
<div id="alogin" style="display:none;" class="card">
<h3>Admin Login</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="err"></p>
</div>

<!-- PARENT LOGIN -->
<div id="plogin" style="display:none;" class="card">
<h3>Parent Login</h3>
<input id="padm" placeholder="Admission">
<input id="pparent" placeholder="Parent Name">
<button onclick="plog()">Login</button>
<p id="perr"></p>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none;">
<div class="sidebar">
<button onclick="load('students')">Students</button>
<button onclick="load('teachers')">Teachers</button>
<button onclick="load('subjects')">Subjects</button>
<button onclick="load('exams')">Exams</button>
<button onclick="load('finance')">Finance</button>
<button onclick="load('reports')">Reports</button>
<button onclick="load('analytics')">Analytics</button>
<button onclick="load('sms')">SMS</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">
<div id="main"></div>
</div>
</div>

<!-- PARENT -->
<div id="parent" style="display:none;padding:20px;">
<h2>Parent Portal</h2>
<div id="pcontent"></div>
<button onclick="logout()">Logout</button>
</div>

<script>

// INIT DEMO DATA
if(!localStorage.init){
localStorage.setItem("students",JSON.stringify([
{name:"John Doe",adm:"ADM1",parent:"Mary"}
]));
localStorage.setItem("subjects",JSON.stringify(["Math","English"]));
localStorage.setItem("marks",JSON.stringify([
{adm:"ADM1",subject:"Math",score:80},
{adm:"ADM1",subject:"English",score:70}
]));
localStorage.setItem("payments",JSON.stringify([
{adm:"ADM1",fee:10000,paid:3000}
]));
localStorage.setItem("teachers",JSON.stringify([]));
localStorage.init=true;
}

const get=k=>JSON.parse(localStorage.getItem(k)||"[]");
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

// NAV
function adminPage(){home.style.display="none";alogin.style.display="block";}
function parentPage(){home.style.display="none";plogin.style.display="block";}

// LOGIN
function login(){
if(u.value==="admin" && p.value==="1234"){
alogin.style.display="none";
admin.style.display="block";
}else err.innerText="Wrong login";
}

// PARENT LOGIN
function plog(){
let st=get("students");
let s=st.find(x=>x.adm===padm.value && x.parent===pparent.value);
if(!s){perr.innerText="Wrong details";return;}
plogin.style.display="none";
parent.style.display="block";
loadParent(s);
}

// LOGOUT
function logout(){location.reload();}

// LOAD
function load(p){
if(p==="students") students();
if(p==="teachers") teachers();
if(p==="subjects") subjects();
if(p==="exams") exams();
if(p==="finance") finance();
if(p==="reports") reports();
if(p==="analytics") analytics();
if(p==="sms") smsPage();
}

//////////////// STUDENTS
function students(){
let st=get("students");
main.innerHTML=`
<div class="card">
<input id="n" placeholder="Name">
<input id="pa" placeholder="Parent">
<input id="ad" placeholder="ADM">
<button onclick="addStudent()">Add</button>
</div>

<div class="card">
${st.map(s=>`${s.name} (${s.adm})`).join("<br>")}
</div>`;
}
function addStudent(){
let st=get("students");
st.push({name:n.value,parent:pa.value,adm:ad.value});
set("students",st); students();
}

//////////////// TEACHERS
function teachers(){
let t=get("teachers");
main.innerHTML=`
<div class="card">
<input id="tn" placeholder="Name">
<input id="ts" placeholder="Subject">
<button onclick="addTeacher()">Add</button>
</div>

<div class="card">
${t.map(x=>`${x.name} - ${x.subject}`).join("<br>")}
</div>`;
}
function addTeacher(){
let t=get("teachers");
t.push({name:tn.value,subject:ts.value});
set("teachers",t); teachers();
}

//////////////// SUBJECTS
function subjects(){
let s=get("subjects");
main.innerHTML=`
<div class="card">
<input id="sub"><button onclick="addSub()">Add</button>
</div>

<div class="card">${s.join("<br>")}</div>`;
}
function addSub(){let s=get("subjects");s.push(sub.value);set("subjects",s);subjects();}

//////////////// EXAMS
function exams(){
let st=get("students"), sub=get("subjects");
main.innerHTML=`
<div class="card">
<select id="s">${st.map(x=>`<option>${x.adm}</option>`)}</select>
<select id="sb">${sub.map(x=>`<option>${x}</option>`)}</select>
<input id="sc" placeholder="Marks">
<button onclick="saveMark()">Save</button>
</div>`;
}
function saveMark(){
let m=get("marks");
m.push({adm:s.value,subject:sb.value,score:Number(sc.value)});
set("marks",m);
alert("Saved");
}

//////////////// FINANCE
function finance(){
let st=get("students"), p=get("payments");
main.innerHTML=`
<div class="card">
<select id="fs">${st.map(x=>`<option>${x.adm}</option>`)}</select>
<input id="fee" placeholder="Total Fee">
<input id="pd" placeholder="Paid">
<button onclick="savePay()">Save</button>
</div>

<div class="card">
${st.map(s=>{
let sp=p.filter(x=>x.adm===s.adm);
let t=sp[0]?.fee||0;
let paid=sp.reduce((a,b)=>a+b.paid,0);
return `${s.name}: Balance ${t-paid} <button onclick="receipt('${s.adm}')">Receipt</button>`;
}).join("<br>")}
</div>

<div id="rec"></div>
`;
}

function savePay(){
let p=get("payments");
p.push({adm:fs.value,fee:Number(fee.value),paid:Number(pd.value)});
set("payments",p); finance();
}

function receipt(adm){
let p=get("payments").filter(x=>x.adm===adm);
let total=p[0]?.fee||0;
let paid=p.reduce((a,b)=>a+b.paid,0);

rec.innerHTML=`
<div class="print">
<h3>Receipt</h3>
<p>ADM: ${adm}</p>
<p>Total: ${total}</p>
<p>Paid: ${paid}</p>
<p>Balance: ${total-paid}</p>
<button onclick="window.print()">Print</button>
</div>`;
}

//////////////// REPORTS
function reports(){
let st=get("students");
main.innerHTML=`
<div class="card">
<select id="rs">${st.map(x=>`<option>${x.adm}</option>`)}</select>
<button onclick="genReport()">Generate</button>
</div>

<div id="rep"></div>
`;
}

function genReport(){
let st=get("students"), m=get("marks");
let s=st.find(x=>x.adm===rs.value);
let mm=m.filter(x=>x.adm===s.adm);

let rows="",t=0;
mm.forEach(x=>{
t+=x.score;
rows+=`<tr><td>${x.subject}</td><td>${x.score}</td></tr>`;
});

rep.innerHTML=`
<div class="print">
<h2>Report Card</h2>
<p>Name: ${s.name}</p>
<p>ADM: ${s.adm}</p>
<table>
<tr><th>Subject</th><th>Marks</th></tr>
${rows}
</table>
<p>Mean: ${(t/mm.length||0).toFixed(1)}</p>
<button onclick="window.print()">Print</button>
</div>`;
}

//////////////// ANALYTICS
function analytics(){
let st=get("students"), m=get("marks");
let res=st.map(s=>{
let mm=m.filter(x=>x.adm===s.adm);
let t=0; mm.forEach(x=>t+=x.score);
return {name:s.name,mean:mm.length?t/mm.length:0};
});
res.sort((a,b)=>b.mean-a.mean);

main.innerHTML=`
<div class="card">Top Student: ${res[0]?.name}</div>
<canvas id="c"></canvas>
`;

setTimeout(()=>{
new Chart(c,{
type:"bar",
data:{labels:res.map(x=>x.name),datasets:[{data:res.map(x=>x.mean)}]}
});
},100);
}

//////////////// SMS MODULE
function smsPage(){
let st=get("students");

main.innerHTML=`
<div class="card">
<h3>Send SMS</h3>

<select id="smsStudent">
${st.map(s=>`<option value="${s.adm}">${s.name}</option>`)}
</select>

<select id="smsType">
<option value="results">Results</option>
<option value="fees">Fees</option>
</select>

<button onclick="generateSMS()">Generate Message</button>

<textarea id="smsText" rows="5"></textarea>

<button onclick="sendSMS()">Send SMS</button>
</div>
`;
}

function generateSMS(){
let adm=smsStudent.value;
let st=get("students").find(s=>s.adm===adm);
let marks=get("marks").filter(m=>m.adm===adm);
let pay=get("payments").filter(p=>p.adm===adm);

let total=0;
marks.forEach(m=>total+=m.score);
let mean=(total/marks.length||0).toFixed(1);

let fee=pay[0]?.fee||0;
let paid=pay.reduce((a,b)=>a+b.paid,0);
let balance=fee-paid;

let msg="";

if(smsType.value==="results"){
msg=`Dear Parent,\n${st.name} mean score: ${mean}`;
}

if(smsType.value==="fees"){
msg=`Dear Parent,\n${st.name} fee balance is ${balance} KES`;
}

smsText.value=msg;
}

function sendSMS(){
if(!smsText.value){alert("Generate message first");return;}
alert("SMS Sent (Simulation)");
}

//////////////// PARENT
function loadParent(s){
let m=get("marks"), p=get("payments");

let mm=m.filter(x=>x.adm===s.adm);
let rows="",t=0;

mm.forEach(x=>{
t+=x.score;
rows+=`<tr><td>${x.subject}</td><td>${x.score}</td></tr>`;
});

let sp=p.filter(x=>x.adm===s.adm);
let total=sp[0]?.fee||0;
let paid=sp.reduce((a,b)=>a+b.paid,0);

pcontent.innerHTML=`
<div class="card"><b>${s.name}</b></div>
<div class="card"><table>${rows}</table><p>Mean ${(t/mm.length||0).toFixed(1)}</p></div>
<div class="card">Balance: ${total-paid}</div>`;
}

</script>

</body>
</html>
